<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Student Registration</title>
  <link rel="stylesheet" href="registration.css">
</head>
<body>
  <div class="form-container">
    <h2>University Student Registration</h2>
    <p>Please fill out all sections carefully to complete your enrollment.</p>
    
    <div id="message" style="display:none; padding:10px; margin-bottom:15px; border-radius:5px; text-align:center;"></div>

    <form id="regform">
      <fieldset>
        <legend>1. Personal Information</legend>
        <div class="row">
          <div class="col">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
            <span id="error-firstName" class="error"></span>
          </div>
          <div class="col">
            <label for="middleName">Middle Name</label>
            <input type="text" id="middleName" required>
            <span id="error-middleName" class="error"></span>
          </div>
          <div class="col">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
            <span id="error-lastName" class="error"></span>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
            <span id="error-dob" class="error"></span>
          </div>
          <div class="col">
            <label>Gender</label>
            <div class="radio-group">
              <label><input type="radio" name="gender" value="Male"> Male</label>
              <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>
            <span id="error-gender" class="error"></span>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label for="photo">Upload Passport Size Photo</label>
            <input type="file" id="photo" accept="image/*" required>
            <span id="error-photo" class="error"></span>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>2. Academic Details</legend>
        <div class="row">
          <div class="col">
            <label for="studentId">Student ID Number</label>
            <input type="text" id="studentId" placeholder="e.g., dbu1701103" required>
            <span id="error-studentId" class="error"></span>
          </div>
          <div class="col">
            <label for="program">Program Type</label>
            <select id="program" required>
              <option value="">Select Program</option>
              <option value="Regular">Regular</option>
              <option value="Extension">Extension</option>
            </select>
            <span id="error-program" class="error"></span>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <label for="dept">Department</label>
            <select id="dept" required>
              <option value="">Select Department</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Software Engineering">Software Engineering</option>
              <option value="Information Technology">Information Technology</option>
            </select>
            <span id="error-dept" class="error"></span>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>3. Contact & Emergency Information</legend>
        <div class="row">
          <div class="col">
            <label for="email">Student Email</label>
            <input type="email" id="email" required>
            <span id="error-email" class="error"></span>
          </div>
          <div class="col">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="09xxxxxxxx" required>
            <span id="error-phone" class="error"></span>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <label for="address">Current Residential Address</label>
            <input type="text" id="address" required>
            <span id="error-address" class="error"></span>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <label for="emergencyName">Emergency Contact Name</label>
            <input type="text" id="emergencyName" required>
            <span id="error-emergencyName" class="error"></span>
          </div>
          <div class="col">
            <label for="emergencyPhone">Emergency Contact Phone</label>
            <input type="text" id="emergencyPhone" required>
            <span id="error-emergencyPhone" class="error"></span>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>4. Portal Password</legend>
        <div class="row">
          <div class="col">
            <label for="password">Create Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters" required>
            <span id="error-password" class="error"></span>
          </div>
        </div>
      </fieldset>

      <div class="terms-container">
        <input type="checkbox" id="terms" required>
        <label for="terms">I declare that all the information provided above is true and accurate.</label>
        <span id="error-terms" class="error"></span>
      </div>

      <div class="actions">
        <button type="submit" class="btn-submit">Submit Registration</button>
        <button type="button" id="printBtn" class="btn-print">Print Slip</button>
      </div>
    </form>
  </div>

  <script src="java.js"></script>
</body>
</html>
